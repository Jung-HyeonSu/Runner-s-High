spring.application.name=RunnersHigh


# ===============================
# DataSource (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/runners_high?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=runners
spring.datasource.password=runners1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging (SQL ???? ???)
# ===============================
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace
